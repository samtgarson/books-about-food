name: Test & Deploy
on:
  push:
    paths:
      - "package.json"
      - "railway.json"
      - .github/workflows/deploy.yml
      - .github/scripts/scrub-ci-db.sql
      - "src/**"
      - "e2e/**"

env:
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
  RAILWAY_PROJECT_ID: 4a6f0233-9778-4f59-86e9-d82e40b63970
  HUSKY: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  preview:
    name: "Deploy preview + seed DB"
    runs-on: ubuntu-latest
    outputs:
      env-name: ${{ steps.create-env.outputs.env_name }}
      web-url: ${{ steps.deploy.outputs.web_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Link Railway project
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment production --service web

      - name: Create ephemeral environment (duplicate of production)
        id: create-env
        run: |
          REF="${{ github.ref_name }}"
          ENV_NAME="ci-$(echo "$REF" | tr '/_' '--' | tr -cd 'a-zA-Z0-9-' | cut -c1-40)"
          # Self-heal any orphan left by a cancelled run, then fork production.
          railway environment delete "$ENV_NAME" -y 2>/dev/null || true
          railway environment new "$ENV_NAME" --duplicate production --json
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Seed ephemeral DB from production (scrubbed)
        run: |
          ENV_NAME="${{ steps.create-env.outputs.env_name }}"
          PROD_DB=$(railway variables --service Postgres --environment production --json | jq -r '.DATABASE_PUBLIC_URL')

          # The duplicated Postgres needs a moment to deploy and have its TCP proxy
          # assigned before DATABASE_PUBLIC_URL resolves and accepts connections.
          CI_DB=""
          for i in $(seq 1 30); do
            CI_DB=$(railway variables --service Postgres --environment "$ENV_NAME" --json | jq -r '.DATABASE_PUBLIC_URL // empty')
            if [ -n "$CI_DB" ] && pg_isready -d "$CI_DB" >/dev/null 2>&1; then
              echo "ephemeral Postgres ready"
              break
            fi
            echo "waiting for ephemeral Postgres... ($i)"
            sleep 10
          done
          if [ -z "$CI_DB" ] || ! pg_isready -d "$CI_DB" >/dev/null 2>&1; then
            echo "ephemeral Postgres never became ready" >&2
            exit 1
          fi

          # DROP guard makes the restore order-independent even if the duplicated
          # web service auto-deployed and ran migrations against the empty schema.
          psql "$CI_DB" -v ON_ERROR_STOP=1 -c "DROP SCHEMA IF EXISTS payload CASCADE;"
          pg_dump "$PROD_DB" --schema=payload --no-owner --no-privileges \
            | psql "$CI_DB" -v ON_ERROR_STOP=1
          psql "$CI_DB" -v ON_ERROR_STOP=1 -f .github/scripts/scrub-ci-db.sql

      - name: Deploy web to ephemeral environment
        id: deploy
        run: |
          ENV_NAME="${{ steps.create-env.outputs.env_name }}"
          # In CI, `railway up` returns after the build; poll for the deployment's
          # terminal status so we also catch pre-deploy `migrate` / start failures.
          railway up --service web --environment "$ENV_NAME" --ci
          .github/scripts/wait-for-deploy.sh web "$ENV_NAME"
          # `railway domain` returns {"domain": "..."} when it generates a new one
          # but {"domains": ["..."]} when the service already has one (the
          # duplicated env auto-provisions a domain from production's).
          WEB_URL=$(railway domain --service web --environment "$ENV_NAME" --json | jq -r '.domain // .domains[0]')
          # Wait for the app to actually serve before handing off to e2e.
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$WEB_URL" || true)
            echo "GET $WEB_URL -> $code"
            [ "$code" != "000" ] && [ "$code" -lt 500 ] && break
            sleep 5
          done
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

  test:
    name: "Run E2E tests"
    needs: [preview]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGE_INSTALL_PAT }}" >> .npmrc
          npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Fetch ephemeral environment credentials
        run: |
          npm install -g @railway/cli
          ENV_NAME="${{ needs.preview.outputs.env-name }}"
          railway link --project "$RAILWAY_PROJECT_ID" --environment production --service web
          # Fetched here (not via job outputs) because GitHub drops job outputs
          # that carry secret-like values (DB password, auth secret).
          CI_DB=$(railway variables --service Postgres --environment "$ENV_NAME" --json | jq -r '.DATABASE_PUBLIC_URL')
          AUTH_SECRET=$(railway variables --service web --environment "$ENV_NAME" --json | jq -r '.BETTER_AUTH_SECRET')
          echo "::add-mask::$CI_DB"
          echo "::add-mask::$AUTH_SECRET"
          {
            echo "DATABASE_URL=$CI_DB"
            echo "DATABASE_DIRECT_URL=$CI_DB"
            echo "BETTER_AUTH_SECRET=$AUTH_SECRET"
          } >> "$GITHUB_ENV"
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npm why @playwright/test --json | jq '.[0].version' -r)" >> $GITHUB_ENV
      - name: Cache playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Create Gmail secret files
        run: |
          echo ${{ secrets.GMAIL_CREDENTIALS_JSON }} | base64 -d > ./e2e/gmail-credentials.json
          echo ${{ secrets.GMAIL_TOKEN_JSON }} | base64 -d > ./e2e/gmail-token.json
      - name: Run Playwright tests
        run: cd e2e && npx playwright test
        env:
          DEPLOYMENT_URL: ${{ needs.preview.outputs.web-url }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: e2e/test-results
          retention-days: 10

  deploy-prod:
    name: "Deploy to Production"
    needs: [preview, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Link Railway project
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment production --service web
      - name: Deploy to production
        run: |
          railway up --service web --environment production --ci
          .github/scripts/wait-for-deploy.sh web production

  cleanup:
    name: "Clean Up"
    needs: [preview, test, deploy-prod]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.preview.outputs.env-name }}
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Link Railway project
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment production --service web
      - name: Delete ephemeral environment
        run: railway environment delete "${{ needs.preview.outputs.env-name }}" -y || true
